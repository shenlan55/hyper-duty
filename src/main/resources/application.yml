spring:
  application:
    name: hyper-duty
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
      enabled: true
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hyper_duty}?currentSchema=public&useUnicode=true&characterEncoding=utf8&connectTimeout=10000&socketTimeout=30000
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:Postgres@123456}
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      # 连接泄漏检测
      remove-abandoned: true
      remove-abandoned-timeout: 180
      log-abandoned: true
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:Redis@123}
      database: 0
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0
          # 连接池配置
          time-between-eviction-runs: 60s
          min-evictable-idle-time: 30m

server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  # Tomcat配置
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100
    max-connections: 10000
    connection-timeout: 20000
    keep-alive-timeout: 60000
    max-http-form-post-size: 25MB

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.lasu.hyperduty.system.entity,com.lasu.hyperduty.duty.entity,com.lasu.hyperduty.pm.entity,com.lasu.hyperduty.ai.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    default-statement-timeout: 30
  global-config:
    db-config:
      id-type: auto
      table-prefix: 
    banner: false

logging:
  level:
    com.lasu.hyperduty: debug
    org.springframework.security: info
  file:
    name: logs/hyper-duty.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-history: 5
      max-file-size: 10MB
      total-size-cap: 100MB

rustfs:
  endpoint: ${RUSTFS_ENDPOINT:http://localhost:9000}
  access-key: ${RUSTFS_ACCESS_KEY:Rustfs}
  secret-key: ${RUSTFS_SECRET_KEY:Rfs@123456}
  bucket-name: ${RUSTFS_BUCKET:hyper-duty}
  region: ${RUSTFS_REGION:us-east-1}

kkfileview:
  endpoint: ${KKFILEVIEW_ENDPOINT:http://localhost:8012}
  preview-path: /onlinePreview

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

# 智谱 AI 配置
