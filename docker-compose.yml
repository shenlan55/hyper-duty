version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=/api
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hyper-duty-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=192.168.3.8
      - DB_PORT=5432
      - DB_NAME=hyper_duty
      - DB_USER=postgres
      - DB_PASSWORD=Postgres@123456
      - REDIS_HOST=192.168.3.8
      - REDIS_PORT=6379
      - REDIS_PASSWORD=Redis@123
      - RUSTFS_ENDPOINT=http://192.168.3.8:9000
      - RUSTFS_ACCESS_KEY=Rustfs
      - RUSTFS_SECRET_KEY=Rfs@123456
      - RUSTFS_BUCKET=hyper-duty
      - RUSTFS_REGION=us-east-1
      - CORS_ALLOWED_ORIGINS=*
      - KKFILEVIEW_ENDPOINT=http://songfu.site:8012
      - BACKEND_URL=http://backend:8080
      - FRONTEND_URL=http://frontend:80
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - JAVA_OPTS=-Xms512m -Xmx1024m -XX:+UseG1GC
    networks:
      - hyper-duty-network
    depends_on:
      kkfileview:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/auth/login-page"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  kkfileview:
    image: keking/kkfileview:4.4.0
    ports:
      - "8012:8012"
    environment:
      - TZ=Asia/Shanghai
      - KK_CONTEXT_PATH=/
      - KK_SERVER_PORT=8012
    security_opt:
      - seccomp:unconfined
    volumes:
      - /dev/shm:/dev/shm
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hyper-duty-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

networks:
  hyper-duty-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
